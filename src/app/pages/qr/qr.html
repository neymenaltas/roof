<div class="qr-page">
  <div class="qr-topbar">
    <button class="btn btn--ghost btn--sm" (click)="goBack()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Geri
    </button>
  </div>

  <div class="qr-body">
    <div class="qr-card">
      <div class="qr-card__header">
        <p class="qr-card__title">Üyelik QR Kodu</p>
        <p class="qr-card__sub">Okutarak üyeliğinizi doğrulayabilirsiniz</p>
      </div>

      <div class="qr-canvas-wrap" [class.expired]="expired()">
        <canvas #qrCanvas></canvas>
        @if (expired()) {
          <div class="qr-expired-overlay">
            <span>⏱</span>
            <p>Süre doldu</p>
            <button class="btn btn--primary btn--sm" (click)="refresh()">Yenile</button>
          </div>
        }
      </div>

      @if (!expired()) {
        <div class="qr-countdown" [class.warning]="countDown() <= 10">
          <div class="qr-countdown__bar" [style.width.%]="(countDown() / 60) * 100" [class.warning]="countDown() <= 10"></div>
          <span>{{ countDown() }}s</span>
        </div>
      }
    </div>
  </div>
</div>
